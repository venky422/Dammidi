<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dammidi - Project Screen</title>
  <style>
    body { margin:0; font-family:Arial,sans-serif; background:#f9f9f9; height:100vh; display:flex; flex-direction:column; }
    .header { position:fixed; top:0; left:0; width:100%; z-index:1000; background:#fff; box-shadow:0 2px 5px rgba(0,0,0,0.2); }
    .top-bar { display:flex; justify-content:space-between; align-items:center; background:#007bff; color:white; padding:15px 30px; }
    .user-info { display:flex; align-items:center; }
    .user-info img { width:40px; height:40px; border-radius:50%; margin-right:10px; }
    .user-details { text-align:right; }
    .breadcrumb { display:flex; justify-content:center; align-items:center; margin:15px 0; }
    .rhombus { width:140px; height:40px; background:#e0e0e0; transform:skew(-20deg); margin:0 10px; display:flex; justify-content:center; align-items:center; cursor:pointer; font-weight:bold; color:#333; box-shadow:0 2px 5px rgba(0,0,0,0.2); }
    .rhombus span { transform:skew(20deg); }
    .rhombus.active { background:#007bff; color:white; }
    .horizontal-bar { height:8mm; background:#007bff; color:white; display:flex; align-items:center; padding:0 20px; font-weight:bold; }
    .layout { flex:1; display:flex; margin-top:calc(120px + 8mm); overflow:hidden; }

    /* Sidebar split into scrollable tasks + fixed new task */
    .sidebar { width:200px; background:#f0f0f0; border-right:1px solid #ccc; display:flex; flex-direction:column; }
    .task-list { flex:1; overflow-y:auto; padding:10px; }
    .task-btn { display:block; width:100%; padding:12px; margin:8px 0; background:#007bff; color:white; border:none; border-radius:5px; text-align:center; cursor:pointer; font-weight:bold; }
    .task-btn:hover, .task-btn.active { background:#0056b3; }
    .new-task { background:#ff5722; border-radius:0; margin:0; }
    .new-task:hover { background:#e64a19; }

    .content { flex:1; display:flex; padding:30px; overflow:hidden; }

    /* Profiles split into scrollable list + fixed new person */
    .profiles-container { width:220px; display:flex; flex-direction:column; }
    .search-box { margin-bottom:10px; padding:8px; border:1px solid #ccc; border-radius:5px; width:100%; }
    .profiles-list { flex:1; display:flex; flex-direction:column; gap:15px; overflow-y:auto; max-height:70vh; }
    .profile-card { text-align:center; cursor:pointer; padding:10px; border-radius:8px; transition:0.3s; background:#f9f9f9; }
    .profile-card img { width:80px; height:80px; border-radius:50%; }
    .profile-card span { display:block; margin-top:8px; font-weight:bold; color:#333; }
    .profile-card:hover, .profile-card.active { background:#007bff; color:white; }
    .new-person { background:#28a745; color:white; border:none; padding:12px; text-align:center; font-weight:bold; cursor:pointer; border-radius:5px; margin-top:100px; }
    .new-person:hover { background:#1e7e34; }

    .profile-details { flex:1; margin-left:20px; padding:20px; background:#fff; border-left:1px solid #ccc; overflow-y:auto; }
    .hidden { display:none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="top-bar">
      <div class="user-info"><img src="profile.png" alt="Profile Icon" /><span>Welcome, Venkatesh</span></div>
      <div class="user-details"><div>UserID: DAM123</div><div>Login Time: 09-Mar-2026 16:35</div></div>
    </div>
    <div class="breadcrumb">
      <div class="rhombus" onclick="location.href='home.html'">HOME</div>
      <div class="rhombus" onclick="location.href='home.html'">Project Home</div>
      <div class="rhombus active"><span>Project Name</span></div>
    </div>
    <div class="horizontal-bar">Dammidi Platform – Project Screen</div>
  </div>

  <div class="layout">
    <!-- Sidebar split -->
    <div class="sidebar">
      <div class="task-list">
        <button class="task-btn" onclick="showProfiles('task1', this)">Task 1</button>
        <button class="task-btn" onclick="showProfiles('task2', this)">Task 2</button>
        <button class="task-btn" onclick="showProfiles('task3', this)">Task 3</button>
      </div>
      <button class="task-btn new-task" onclick="showProfiles('new', this)">New Task</button>
    </div>

    <div class="content">
      <div class="profiles-container">
        <input type="text" id="searchBox" class="search-box" placeholder="Search profiles..." onkeyup="filterProfiles()">
        <div id="profiles" class="profiles-list"></div>
        <button class="new-person" onclick="addNewPerson()">+ New Person</button>
      </div>
      <div id="profile-details" class="profile-details hidden">
        <h3>Profile Details</h3>
        <p>Select a profile to see details here.</p>
      </div>
    </div>
  </div>

  <script>
    const taskProfiles = {
      task1: [
        {name:"Person One", img:"person1.png"},
        {name:"Person Two", img:""}, // no image, uses default
        {name:"Person Three", img:"person3.png"},
        {name:"Person Four", img:""}
      ],
      task2: [
        {name:"Person Five", img:"person5.png"},
        {name:"Person Six", img:""}
      ],
      task3: [
        {name:"Person Seven", img:""}
      ],
      new: []
    };

    let currentProfiles = [];

    function showProfiles(task, btn) {
      document.querySelectorAll(".task-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");

      currentProfiles = taskProfiles[task];
      renderProfiles(currentProfiles);

      document.getElementById("profile-details").classList.add("hidden");
      document.getElementById("searchBox").value = "";
    }

    function renderProfiles(profiles) {
      const profilesDiv = document.getElementById("profiles");
      profilesDiv.innerHTML = "";
      profiles.forEach(p => {
        const imgSrc = p.img && p.img.trim() !== "" ? p.img : "profile.png"; // default image
        const card = document.createElement("div");
        card.className = "profile-card";
        card.innerHTML = `<img src="${imgSrc}" alt="${p.name}"><span>${p.name}</span>`;
        card.onclick = () => selectProfile(card, p, imgSrc);
        profilesDiv.appendChild(card);
      });
    }

    function filterProfiles() {
      const query = document.getElementById("searchBox").value.toLowerCase();
      const filtered = currentProfiles.filter(p => p.name.toLowerCase().includes(query));
      renderProfiles(filtered);
    }

    function selectProfile(element, profile, imgSrc) {
      document.querySelectorAll(".profile-card").forEach(card => card.classList.remove("active"));
      element.classList.add("active");

      const details = document.getElementById("profile-details");
      details.classList.remove("hidden");
      details.innerHTML = `
        <h3>${profile.name}</h3>
        <img src="${imgSrc}" width="120" style="border-radius:50%">
        <p>Additional details about ${profile.name} go here.</p>
      `;
    }

    function addNewPerson() {
      const newPerson = {name:"New Person", img:""}; // default image
      currentProfiles.push(newPerson);
      renderProfiles(currentProfiles);
    }
  </script>
</head>
</html>
