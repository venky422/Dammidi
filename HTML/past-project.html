<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dammidi - Home</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Path 1: Top bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #007bff;
      color: white;
      padding: 15px 30px;
    }
    .user-info {
      display: flex;
      align-items: center;
    }
    .user-info img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      margin-right: 10px;
    }
    .user-details {
      text-align: right;
    }

    /* Path 2–5: Main section */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* Part 1: Fixed project category buttons */
    .project-tabs {
      display: flex;
      justify-content: center;
      background: #e0e0e0;
      padding: 15px;
    }
    .tab {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #ccc;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 20px;
      cursor: pointer;
      font-weight: bold;
      text-align: center;
    }
    .tab.active {
      background: #007bff;
      color: white;
    }

    /* Part 2: Scrollable running projects */
    .projects-section {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-start;
      align-content: flex-start;
      gap: 20px;
    }
    .project-logo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #28a745;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      cursor: pointer;
    }
    .project-logo:hover {
      background: #1e7e34;
    }
    .new-project {
      background: #ff5722;
    }
    .new-project:hover {
      background: #e64a19;
    }
  </style>
</head>
<body>
  <!-- Path 1: Top bar -->
  <div class="top-bar">
    <div class="user-info">
      <img src="profile.png" alt="Profile Icon" />
      <span>Welcome, Venkatesh</span>
    </div>
    <div class="user-details">
      <div>UserID: DAM123</div>
      <div>Login Time: 22-Feb-2026 15:50</div>
    </div>
  </div>

  <!-- Path 2–5: Main content -->
  <div class="main">
    <!-- Part 1: Fixed tabs -->
    <div class="project-tabs">
      <div class="tab active" onclick="location.href='past-project.html'">Past Projects</div>
      <div class="tab" onclick="location.href='home.html'">Running Projects</div>
      <div class="tab" onclick="location.href='future-projects.html'">Future Projects</div>
    </div>

    <!-- Part 2: Scrollable running projects -->
    <div class="projects-section">
      <!-- Example running projects -->
      <div class="project-logo">Project 1</div>
      <div class="project-logo">Project 2</div>
      <div class="project-logo">Project 3</div>
      <div class="project-logo">Project 4</div>
      <div class="project-logo">Project 5</div>
      <div class="project-logo">Project 6</div>
      <div class="project-logo">Project 7</div>
      <div class="project-logo">Project 8</div>
      <!-- New Project button -->
    </div>
  </div>
</body>
</html>
